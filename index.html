<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cápsula Digital - Citlally</title>
    <style>
        /* Estilos Base: Estética Hacker */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #39ff14; /* Verde neón */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Evita scroll por el guardián */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El Guardián que sigue al cursor */
        #guardian {
            position: fixed;
            width: 80px;
            pointer-events: none; /* No interfiere con los clics */
            transition: transform 0.1s ease-out;
            z-index: 100;
        }

        /* El Cofre interactivo */
        #cofre {
            cursor: pointer;
            width: 200px;
            transition: filter 0.3s, transform 0.3s;
            filter: drop-shadow(0 0 10px #00f3ff); /* Brillo cian */
        }

        #cofre:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #00f3ff);
        }

        /* Ventana Emergente (Modal) */
        .modal {
            display: none; 
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #111;
            padding: 30px;
            border: 2px solid #39ff14;
            box-shadow: 0 0 30px #39ff14;
            text-align: center;
            border-radius: 15px;
            max-width: 400px;
        }

        .modal-content h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .modal-content img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }

        #close-btn {
            margin-top: 20px;
            background: transparent;
            color: #39ff14;
            border: 1px solid #39ff14;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }

        #close-btn:hover {
            background: #39ff14;
            color: #000;
        }
    </style>
</head>
<body>

    <img src="guardian.png" id="guardian" alt="Guardián">

    <div id="app">
        <img src="cofre.png" id="cofre" alt="Cofre del Tesoro">
        <p style="text-align: center;">HAZ CLIC PARA DESCIFRAR</p>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h2>¡Acceso Concedido!</h2>
            <p>Usuario: <strong>Citlally</strong></p>
            <img src="tesoro.gif" alt="Tesoro Revelado">
            <br>
            <button id="close-btn">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        const guardian = document.getElementById('guardian');
        const cofre = document.getElementById('cofre');
        const modal = document.getElementById('miModal');
        const closeBtn = document.getElementById('close-btn');

        // 1. Lógica para que el guardián siga al cursor
        document.addEventListener('mousemove', (e) => {
            // Calculamos la posición para centrar la imagen en el cursor
            const x = e.clientX - 40;
            const y = e.clientY - 40;
            
            // Aplicamos el movimiento
            guardian.style.left = `${x}px`;
            guardian.style.top = `${y}px`;
        });

        // 2. Lógica para abrir el modal al hacer clic en el cofre
        cofre.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        // 3. Lógica para cerrar el modal
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // Cerrar si se hace clic fuera del contenido del modal
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
